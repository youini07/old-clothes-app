<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>카카오맵 테스트</title>
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=66bc9999ee637da6b707cb39f61b187a&libraries=services"></script>
</head>
<body>
    <h2 style="text-align: center;">카카오맵 API 테스트 페이지</h2>
    <div id="map" style="width:100%;height:400px; border: 2px solid red;"></div>
    
    <div id="status" style="margin-top: 20px; font-weight: bold; color: red; text-align: center;"></div>

    <script>
        window.onload = function() {
            setTimeout(function() {
                try {
                    var mapContainer = document.getElementById('map'), // 지도를 표시할 div 
                        mapOption = { 
                            center: new kakao.maps.LatLng(37.2636, 127.0286), // 지도의 중심좌표
                            level: 3 // 지도의 확대 레벨
                        };

                    // 지도를 표시할 div와  지도 옵션으로  지도를 생성합니다
                    var map = new kakao.maps.Map(mapContainer, mapOption); 
                    
                    document.getElementById('status').innerText = "지도 로드 성공! (빨간 테두리 안에 지도가 보인다면 React 코드 문제입니다.)";
                    document.getElementById('status').style.color = "green";
                } catch(e) {
                    document.getElementById('status').innerText = "에러 발생: " + e.message + "\n(도메인 설정이나 API 키 문제일 확률이 높습니다. F12 콘솔 확인 필요)";
                }
            }, 500);
        };
    </script>
</body>
</html>
