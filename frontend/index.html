<!doctype html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  
  <!-- SEO & PWA 메타태그 -->
  <title>올클 (ALL-CLEAR) - 올드 클로드, 올 클리어. (Old Cloth , All Clear)</title>
  <meta name="description" content="올클 - 집에서 편하게 헌옷 수거 신청! 원하는 시간에 기사님이 방문합니다. Old Cloth, All Clear." />
  <meta name="theme-color" content="#3A3C41" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="올클" />
  
  <!-- PWA 매니페스트 & 아이콘 (접속 경로에 따라 고객용/관리자용 분리) -->
  <script>
    if (window.location.pathname.startsWith('/staff-login') || window.location.pathname.startsWith('/driver') || window.location.pathname.startsWith('/admin')) {
      document.write('<link rel="manifest" href="/manifest-staff.json" />');
    } else {
      document.write('<link rel="manifest" href="/manifest.json" />');
    }
  </script>
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  
  <!-- 외부 스크립트 -->
  <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
  <script type="text/javascript"
    src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=09dcef81d39afa1d5b0f7f61fd632819&libraries=services,clusterer,drawing&autoload=false"></script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
  
  <!-- Service Worker 등록 -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then((reg) => console.log('SW registered:', reg.scope))
          .catch((err) => console.log('SW registration failed:', err));
      });
    }
  </script>
</body>

</html>
